<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Detail — BorderBridge</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/case-detail.css" />
</head>
<body>
  <div id="navbar-root"></div>

  <main class="case-detail-layout">
    <!-- Case header -->
    <header class="case-header" id="case-header">
      <div class="case-header-left">
        <a href="authority-dashboard.html" class="back-link">← Dashboard</a>
        <h1 id="case-code">Loading…</h1>
        <span class="badge" id="case-status"></span>
      </div>
      <div class="case-header-right">
        <div id="score-badge-container"></div>
      </div>
    </header>

    <!-- Person info -->
    <section class="card" id="person-info">
      <h2>Person Details</h2>
      <div class="detail-grid" id="person-grid">
        <p class="loading">Loading…</p>
      </div>
    </section>

    <!-- Score explanation -->
    <section class="card" id="score-explanation">
      <h2>Score Breakdown</h2>
      <div id="score-detail-container">
        <p class="loading">Loading…</p>
      </div>
    </section>

    <!-- Evidence table -->
    <section class="card">
      <div class="section-header">
        <h2>Evidence</h2>
        <button class="btn btn-sm btn-primary" id="add-evidence-btn">+ Add Evidence</button>
      </div>
      <div id="evidence-table-container">
        <p class="loading">Loading…</p>
      </div>
    </section>

    <!-- Graph view -->
    <section class="card">
      <h2>Evidence Graph</h2>
      <div id="graph-container" class="graph-canvas">
        <p class="loading">Loading graph…</p>
      </div>
    </section>

    <!-- Actions -->
    <section class="case-actions">
      <button class="btn btn-primary" id="recompute-btn">Recompute Score</button>
      <button class="btn btn-outline" id="referral-btn">Create Referral</button>
    </section>
  </main>

  <script type="module" src="../js/pages/case-detail.js"></script>
  <script type="module">
    import { renderNavbar } from "../js/components/navbar.js";
    renderNavbar(document.getElementById("navbar-root"), "authority");
  </script>
</body>
</html>
