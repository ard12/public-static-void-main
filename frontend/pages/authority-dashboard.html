<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authority Dashboard — BorderBridge</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/authority-dashboard.css" />
</head>
<body>
  <div id="navbar-root"></div>

  <main class="dashboard-layout">
    <header class="dashboard-header">
      <h1>Authority Dashboard</h1>
      <p class="subtitle">Review cases, manage evidence, monitor identity confidence scores</p>
    </header>

    <!-- Stats row -->
    <section class="stats-row" id="stats-row">
      <div class="stat-card">
        <span class="stat-value" id="total-cases">—</span>
        <span class="stat-label">Total Cases</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="pending-review">—</span>
        <span class="stat-label">Pending Review</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="avg-score">—</span>
        <span class="stat-label">Avg Score</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="verified-count">—</span>
        <span class="stat-label">Verified</span>
      </div>
    </section>

    <!-- Case list -->
    <section class="case-list-section">
      <div class="section-header">
        <h2>Cases</h2>
        <div class="filters">
          <select id="status-filter">
            <option value="">All Statuses</option>
            <option value="intake">Intake</option>
            <option value="under_review">Under Review</option>
            <option value="provisional_identity">Provisional</option>
            <option value="verified_identity">Verified</option>
            <option value="referred">Referred</option>
          </select>
          <input type="search" id="search-input" placeholder="Search cases…" />
        </div>
      </div>
      <div id="case-table-container">
        <p class="loading">Loading cases…</p>
      </div>
    </section>
  </main>

  <script type="module" src="../js/pages/authority-dashboard.js"></script>
  <script type="module">
    import { renderNavbar } from "../js/components/navbar.js";
    renderNavbar(document.getElementById("navbar-root"), "authority");
  </script>
</body>
</html>
