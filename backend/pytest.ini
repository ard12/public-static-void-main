[pytest]
# Run tests in a specific order to avoid Windows event loop corruption.
# test_repository_factory.py uses asyncio.run() directly, which must run
# AFTER all TestClient-based tests on Python 3.14+ / Windows.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Explicit ordering: repository/unit tests last to avoid event-loop pollution
# for the FastAPI TestClient tests
